<!DOCTYPE html>
<html>
<head>
    <title>Simple Navbar</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        nav{
            background-color:#333;
            padding:15px;
        }

        nav ul{
            list-style:none;
            display:flex;
            justify-content:center;
        }

        nav ul li{
            margin:0 20px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            padding:8px 12px;
        }

        nav ul li a:hover{
            background-color:#555;
            border-radius:5px;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Menu</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Blogs</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>
</html>
