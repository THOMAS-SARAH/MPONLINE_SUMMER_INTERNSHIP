<!DOCTYPE html>
<html>
<head>
    <title>Sales Demo</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#ececf1;
            text-align:center;
        }

        h2{
            margin-top:30px;
        }

        table{
            width:65%;
            margin:20px auto;
            border-collapse:collapse;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        th, td{
            border:1px solid #d5d5d5;
            padding:8px;
            text-align:center;
        }

        th{
            background:#57c14d;
            color:white;
        }

        td{
            background:#f2f2f2;
        }
    </style>
</head>
<body>

    <h2>SALES DEMONSTRATION</h2>

    <table>
        <tr>
            <th rowspan="2">Region</th>
            <th colspan="2">Sales</th>
            <th rowspan="2">Manager</th>
        </tr>

        <tr>
            <th>Product A</th>
            <th>Product B</th>
        </tr>

        <tr>
            <td rowspan="2">North</td>
            <td>120</td>
            <td>150</td>
            <td>Govinda</td>
        </tr>

        <tr>
            <td>90</td>
            <td>110</td>
            <td>Ram</td>
        </tr>

        <tr>
            <td>South</td>
            <td>200</td>
            <td>180</td>
            <td>R. Madhav</td>
        </tr>
    </table>

</body>
</html>
