@model BankingMVC.Models.Account

<h2>Account Details</h2>

<table border="1" cellpadding="10">

    <tr>
        <th>Account Number</th>
        <td>@Model.AccountNumber</td>
    </tr>

    <tr>
        <th>Customer Name</th>
        <td>@Model.CustomerName</td>
    </tr>

    <tr>
        <th>Balance</th>
        <td>@Model.Balance</td>
    </tr>

</table>

<br />

<a asp-action="Index">Back</a>
