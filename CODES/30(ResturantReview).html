<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f4f4f4;
        }

        h1, h2 {
            text-align: center;
        }

        .menu, .reviews {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 60%;
            border-radius: 8px;
        }

        ul {
            list-style-type: none;
        }

        li {
            padding: 5px;
        }

        video, audio {
            display: block;
            margin: 10px auto;
        }
    </style>
</head>
<body>

    <h1>Sarah's Restaurant</h1>

    <div class="menu">
        <h2>Menu</h2>
        <ul>
            <li>Veg Biryani - ₹180</li>
            <li>Paneer Butter Masala - ₹220</li>
            <li>Masala Dosa - ₹100</li>
            <li>Cold Coffee - ₹80</li>
        </ul>
    </div>

    <div class="reviews">
        <h2>Customer Reviews</h2>
        <p>⭐⭐⭐⭐⭐ Excellent food and service!</p>
        <p>⭐⭐⭐⭐ Tasty dishes and good ambience.</p>
    </div>

    <h2>Restaurant Video</h2>
    <video width="320" controls>
        <source src="restaurant.mp4" type="video/mp4">  <!-- dummy name is given for video file -->
        Your browser does not support video.
    </video>

    <h2>Background Music</h2>
    <audio controls>
        <source src="music.mp3" type="audio/mpeg">  <!-- dummy name is given for audio file -->
        Your browser does not support audio.
    </audio>

</body>
</html>
